name: Build GTalk Flutter

on:
  push:
    tags: ['v*']

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: GTalk-Android
          path: flutter/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - uses: actions/upload-artifact@v4
        with:
          name: GTalk-iOS
          path: flutter/build/ios/iphoneos/Runner.app

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Bundle VC++ Runtime
        run: |
          copy "C:\Windows\System32\msvcp140.dll" "build\windows\x64\runner\Release\"
          copy "C:\Windows\System32\vcruntime140.dll" "build\windows\x64\runner\Release\"
          copy "C:\Windows\System32\vcruntime140_1.dll" "build\windows\x64\runner\Release\"
      - uses: actions/upload-artifact@v4
        with:
          name: GTalk-Windows-Flutter
          path: flutter/build/windows/x64/runner/Release/

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: GTalk-Linux-Flutter
          path: flutter/build/linux/x64/release/bundle/

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
      - run: flutter pub get
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: GTalk-macOS-Flutter
          path: flutter/build/macos/Build/Products/Release/GTalk.app
