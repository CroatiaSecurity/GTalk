name: Build GTalk

on:
  push:
    tags: ['v*']

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install PyQt6 cryptography pyinstaller
      - run: pyinstaller --onefile --windowed --name GTalk gtalk.py
      - uses: actions/upload-artifact@v4
        with:
          name: GTalk-Windows
          path: dist/GTalk.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install PyQt6 cryptography pyinstaller
      - run: pyinstaller --onefile --windowed --name GTalk gtalk.py
      - run: |
          mkdir -p GTalk.app/Contents/MacOS
          cp dist/GTalk GTalk.app/Contents/MacOS/
          hdiutil create -volname GTalk -srcfolder GTalk.app -ov GTalk.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: GTalk-macOS
          path: GTalk.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libegl1
      - run: pip install PyQt6 cryptography pyinstaller
      - run: pyinstaller --onefile --name gtalk gtalk.py
      - uses: actions/upload-artifact@v4
        with:
          name: GTalk-Linux
          path: dist/gtalk

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            GTalk-Windows/GTalk.exe
            GTalk-macOS/GTalk.dmg
            GTalk-Linux/gtalk
